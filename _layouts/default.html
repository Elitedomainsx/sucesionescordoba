<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    {% seo %}

    {%- if site.site_noindex == true and page.noindex != false -%}
    <meta name="robots" content="noindex,nofollow" />
    {%- endif -%}

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts (Creative) -->
    <link href="https://fonts.googleapis.com/css?family=Merriweather+Sans:400,700" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Merriweather:400,300,300italic,400italic,700,700italic" rel="stylesheet" type="text/css" />

    <!-- Creative CSS (includes Bootstrap) -->
    <link href="/assets/creative/css/styles.css" rel="stylesheet" />

    <!-- Site overrides -->
    <link rel="stylesheet" href="/assets/css/site.css" />
  </head>
  <body id="page-top" class="{% if page.url != '/' %}page-internal{% endif %}">
    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <!-- Bootstrap core JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS -->
    <script src="/assets/creative/js/scripts.js"></script>
  </body>
</html>
